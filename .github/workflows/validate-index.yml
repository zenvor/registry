name: Validate Index

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'index.json'

permissions:
  pull-requests: write
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate index.json schema
        id: schema
        run: |
          python3 << 'PYEOF'
          import json, re, sys

          with open('index.json') as f:
              data = json.load(f)

          errors = []

          # Check version
          if data.get('version') != 1:
              errors.append(f'version must be 1, got {data.get("version")}')

          packs = data.get('packs', [])
          if not isinstance(packs, list):
              errors.append('packs must be an array')
              print('\n'.join(errors))
              sys.exit(1)

          REQUIRED_FIELDS = [
              'name', 'display_name', 'version', 'trust_tier',
              'categories', 'language', 'sound_count',
              'source_repo', 'source_ref', 'source_path',
          ]

          NAME_RE = re.compile(r'^[a-z0-9][a-z0-9_-]{0,63}$')
          VERSION_RE = re.compile(r'^\d+\.\d+\.\d+$')
          VALID_TIERS = {'official', 'verified', 'community'}

          seen_names = set()
          prev_name = ''

          for i, pack in enumerate(packs):
              prefix = f'packs[{i}]'

              # Required fields
              for field in REQUIRED_FIELDS:
                  if field not in pack:
                      errors.append(f'{prefix}: missing required field "{field}"')

              name = pack.get('name', '')

              # Name pattern
              if name and not NAME_RE.match(name):
                  errors.append(f'{prefix}: name "{name}" does not match ^[a-z0-9][a-z0-9_-]{{0,63}}$')

              # Name uniqueness
              if name in seen_names:
                  errors.append(f'{prefix}: duplicate name "{name}"')
              seen_names.add(name)

              # Alphabetical sort order
              if name and name < prev_name:
                  errors.append(f'{prefix}: name "{name}" is out of alphabetical order (after "{prev_name}")')
              prev_name = name

              # Version pattern
              version = pack.get('version', '')
              if version and not VERSION_RE.match(version):
                  errors.append(f'{prefix}: version "{version}" does not match ^\\d+\\.\\d+\\.\\d+$')

              # Trust tier
              tier = pack.get('trust_tier', '')
              if tier and tier not in VALID_TIERS:
                  errors.append(f'{prefix}: trust_tier "{tier}" not in {VALID_TIERS}')

          if errors:
              count = len(errors)
              noun = 'error' if count == 1 else 'errors'
              print(f'Validation failed with {count} {noun}:')
              for e in errors:
                  print(f'  - {e}')
              # Write errors for review comment
              with open('schema_errors.json', 'w') as f:
                  json.dump(errors, f)
              sys.exit(1)

          print(f'index.json is valid: {len(packs)} packs')
          with open('schema_errors.json', 'w') as f:
              json.dump([], f)
          PYEOF

      - name: Detect new/changed packs
        id: detect
        if: always()
        run: |
          python3 -c "
          import json, sys

          # Load PR version
          with open('index.json') as f:
              pr_data = json.load(f)
          pr_packs = {p['name']: p for p in pr_data.get('packs', [])}

          # Load base version (main branch)
          import subprocess
          result = subprocess.run(['git', 'show', 'origin/main:index.json'], capture_output=True, text=True)
          if result.returncode == 0:
              base_data = json.loads(result.stdout)
              base_packs = {p['name']: p for p in base_data.get('packs', [])}
          else:
              base_packs = {}

          # Find new or changed packs
          new_packs = []
          updated_packs = []
          for name, pack in pr_packs.items():
              if name not in base_packs:
                  new_packs.append(name)
              elif pack != base_packs[name]:
                  updated_packs.append(name)

          changed = new_packs + updated_packs

          # Write detection results
          results = {
              'new': new_packs,
              'updated': updated_packs,
              'packs': {n: pr_packs[n] for n in changed}
          }
          with open('detect_results.json', 'w') as f:
              json.dump(results, f)

          if changed:
              names = ', '.join(changed)
              print(f'Changed packs: {names}')
              with open('changed_packs.json', 'w') as f:
                  json.dump([pr_packs[n] for n in changed], f)
          else:
              print('No pack changes detected')
              with open('changed_packs.json', 'w') as f:
                  json.dump([], f)
          "

      - name: Validate trust tier
        id: trust
        if: always() && steps.detect.outcome == 'success'
        env:
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          association = os.environ.get('PR_AUTHOR_ASSOCIATION', '')
          is_org_member = association in ('OWNER', 'MEMBER')

          with open('changed_packs.json') as f:
              packs = json.load(f)

          errors = []
          for pack in packs:
              tier = pack.get('trust_tier', '')
              name = pack.get('name', '')
              if not is_org_member and tier in ('official', 'verified'):
                  errors.append(f'{name}: community contributors cannot use trust_tier "{tier}" (use "community")')

          with open('trust_errors.json', 'w') as f:
              json.dump(errors, f)

          if errors:
              for e in errors:
                  print(f'Error: {e}')
              sys.exit(1)
          else:
              print(f'Trust tier check passed (author association: {association})')
          PYEOF

      - name: Validate pack sources
        id: sources
        if: always() && steps.detect.outcome == 'success'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, hashlib, sys, os

          with open('changed_packs.json') as f:
              packs = json.load(f)

          if not packs:
              print("No new/changed packs to validate")
              with open('source_results.json', 'w') as f:
                  json.dump({'errors': [], 'warnings': [], 'checks': {}}, f)
              sys.exit(0)

          ALLOWED_EXTENSIONS = {'.wav', '.mp3', '.ogg', '.flac', '.m4a'}
          MAX_PACK_SIZE = 50 * 1024 * 1024  # 50MB max per pack
          MAX_FILE_SIZE = 10 * 1024 * 1024   # 10MB max per file
          errors = []
          warnings = []
          checks = {}  # per-pack check results

          for pack in packs:
              name = pack['name']
              repo = pack.get('source_repo', '')
              ref = pack.get('source_ref', 'main')
              path = pack.get('source_path', '.')
              pack_checks = {'manifest': False, 'sha256': None, 'audio_files': []}
              print(f"\n=== Validating {name} ({repo}@{ref}) ===")

              if not repo:
                  errors.append(f"{name}: missing source_repo")
                  checks[name] = pack_checks
                  continue

              # Build base URL
              if path and path != '.':
                  base = f"https://raw.githubusercontent.com/{repo}/{ref}/{path}"
              else:
                  base = f"https://raw.githubusercontent.com/{repo}/{ref}"

              # 1. Fetch and validate manifest
              manifest_url = f"{base}/openpeon.json"
              try:
                  req = urllib.request.urlopen(manifest_url, timeout=15)
                  manifest_bytes = req.read()
                  manifest = json.loads(manifest_bytes)
                  pack_checks['manifest'] = True
                  print(f"  Manifest: OK ({len(manifest_bytes)} bytes)")
              except Exception as e:
                  errors.append(f"{name}: cannot fetch manifest at {manifest_url}: {e}")
                  checks[name] = pack_checks
                  continue

              # 2. Verify manifest SHA256 if provided
              claimed_sha = pack.get('manifest_sha256', '')
              if claimed_sha:
                  actual_sha = hashlib.sha256(manifest_bytes).hexdigest()
                  if actual_sha != claimed_sha:
                      errors.append(f"{name}: manifest SHA256 mismatch (claimed {claimed_sha[:16]}... got {actual_sha[:16]}...)")
                      pack_checks['sha256'] = False
                  else:
                      pack_checks['sha256'] = True
                      print(f"  SHA256: OK")
              else:
                  pack_checks['sha256'] = None  # not provided

              # 3. Validate manifest structure
              if 'name' not in manifest:
                  errors.append(f"{name}: manifest missing 'name' field")
              if 'categories' not in manifest:
                  errors.append(f"{name}: manifest missing 'categories' field")
                  checks[name] = pack_checks
                  continue

              # 4. Collect all sound files
              sound_files = set()
              for cat_name, cat_data in manifest.get('categories', {}).items():
                  for sound in cat_data.get('sounds', []):
                      f = sound.get('file', '')
                      if f:
                          sound_files.add(f)

              if not sound_files:
                  errors.append(f"{name}: no sound files referenced in manifest")
                  checks[name] = pack_checks
                  continue

              claimed_count = pack.get('sound_count', 0)
              if claimed_count and len(sound_files) != claimed_count:
                  warnings.append(f"{name}: sound_count={claimed_count} but manifest references {len(sound_files)} unique files")

              print(f"  Sound files: {len(sound_files)} referenced")

              # 5. Spot-check up to 3 sound files exist and are audio
              for sfile in sorted(sound_files)[:3]:
                  sound_url = f"{base}/{sfile}"
                  try:
                      req = urllib.request.urlopen(sound_url, timeout=15)
                      data = req.read(256)
                      size = int(req.headers.get('Content-Length', 0))

                      ext = os.path.splitext(sfile)[1].lower()
                      if ext not in ALLOWED_EXTENSIONS:
                          errors.append(f"{name}: {sfile} has disallowed extension '{ext}'")
                          pack_checks['audio_files'].append({'file': sfile, 'ok': False})
                          continue

                      is_audio = False
                      if data[:4] == b'RIFF':
                          is_audio = True
                      elif data[:3] == b'ID3' or data[:2] == b'\xff\xfb' or data[:2] == b'\xff\xf3':
                          is_audio = True
                      elif data[:4] == b'OggS':
                          is_audio = True
                      elif data[:4] == b'fLaC':
                          is_audio = True
                      elif data[4:8] == b'ftyp':
                          is_audio = True

                      if not is_audio:
                          errors.append(f"{name}: {sfile} does not appear to be a valid audio file")
                          pack_checks['audio_files'].append({'file': sfile, 'ok': False})
                      else:
                          pack_checks['audio_files'].append({'file': sfile, 'ok': True, 'size': size})
                          print(f"  {sfile}: OK ({ext}, {size} bytes)")

                      if size > MAX_FILE_SIZE:
                          errors.append(f"{name}: {sfile} is {size / 1024 / 1024:.1f}MB (max {MAX_FILE_SIZE / 1024 / 1024:.0f}MB)")

                  except Exception as e:
                      errors.append(f"{name}: cannot fetch sound {sfile}: {e}")
                      pack_checks['audio_files'].append({'file': sfile, 'ok': False})

              # 6. Collect icon files from manifest
              MAX_ICON_SIZE = 500 * 1024  # 500KB max per icon
              icon_files = set()
              pack_icon = manifest.get('icon', '')
              if pack_icon:
                  icon_files.add(pack_icon)
              for cat_name, cat_data in manifest.get('categories', {}).items():
                  cat_icon = cat_data.get('icon', '')
                  if cat_icon:
                      icon_files.add(cat_icon)
                  for sound in cat_data.get('sounds', []):
                      sound_icon = sound.get('icon', '')
                      if sound_icon:
                          icon_files.add(sound_icon)

              # 7. Spot-check up to 2 icon files
              if icon_files:
                  print(f"  Icon files: {len(icon_files)} referenced")
                  pack_checks['icon_files'] = []
                  for icon_path in sorted(icon_files)[:2]:
                      icon_url = f"{base}/{icon_path}"
                      try:
                          req = urllib.request.urlopen(icon_url, timeout=15)
                          data = req.read(512)
                          size = int(req.headers.get('Content-Length', len(data)))

                          is_image = False
                          ext = os.path.splitext(icon_path)[1].lower()
                          if data[:4] == b'\x89PNG':
                              is_image = True
                          elif data[:3] == b'\xff\xd8\xff':
                              is_image = True
                          elif data[:4] == b'RIFF' and data[8:12] == b'WEBP':
                              is_image = True
                          elif b'<svg' in data[:256]:
                              is_image = True

                          if not is_image:
                              warnings.append(f"{name}: icon {icon_path} does not appear to be a valid image file")
                              pack_checks['icon_files'].append({'file': icon_path, 'ok': False})
                          elif size > MAX_ICON_SIZE:
                              warnings.append(f"{name}: icon {icon_path} is {size / 1024:.0f}KB (max 500KB)")
                              pack_checks['icon_files'].append({'file': icon_path, 'ok': False, 'size': size})
                          else:
                              pack_checks['icon_files'].append({'file': icon_path, 'ok': True, 'size': size})
                              print(f"  {icon_path}: OK (icon, {size} bytes)")

                      except Exception as e:
                          warnings.append(f"{name}: cannot fetch icon {icon_path}: {e}")
                          pack_checks['icon_files'].append({'file': icon_path, 'ok': False})

              # 8. Check claimed total size
              claimed_size = pack.get('total_size_bytes', 0)
              if claimed_size and claimed_size > MAX_PACK_SIZE:
                  errors.append(f"{name}: total_size_bytes={claimed_size} exceeds {MAX_PACK_SIZE / 1024 / 1024:.0f}MB limit")

              checks[name] = pack_checks

          # Save results
          with open('source_results.json', 'w') as f:
              json.dump({'errors': errors, 'warnings': warnings, 'checks': checks}, f)

          # Report
          print("\n" + "=" * 60)
          if warnings:
              print(f"\nWarnings ({len(warnings)}):")
              for w in warnings:
                  print(f"  - {w}")

          if errors:
              print(f"\nErrors ({len(errors)}):")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print(f"\nAll {len(packs)} {'pack' if len(packs) == 1 else 'packs'} validated successfully")
          PYEOF

      - name: Validate category coverage
        id: coverage
        if: always() && steps.detect.outcome == 'success'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, sys, time

          CORE_CATEGORIES = [
              'session.start', 'task.acknowledge', 'task.complete',
              'task.error', 'input.required', 'resource.limit',
          ]
          MIN_TOTAL_SOUNDS = 6
          WARN_TOTAL_SOUNDS = 12
          MAX_MANIFEST_BYTES = 256 * 1024  # 256 KB
          FETCH_TIMEOUT = 15
          MAX_RETRIES = 3
          RETRY_DELAYS = [2, 5]  # seconds between retries

          def is_transient(exc):
              """Return True for errors worth retrying."""
              transient_types = (ConnectionResetError, ConnectionAbortedError, TimeoutError, OSError)
              if isinstance(exc, transient_types):
                  return True
              if isinstance(exc, urllib.error.URLError) and not isinstance(exc, urllib.error.HTTPError):
                  return True
              if isinstance(exc, urllib.error.HTTPError) and exc.code >= 500:
                  return True
              return False

          def fetch_manifest(url):
              """Fetch manifest with retry and size cap. Returns bytes or raises."""
              last_exc = None
              for attempt in range(MAX_RETRIES):
                  try:
                      req = urllib.request.urlopen(url, timeout=FETCH_TIMEOUT)
                      data = req.read(MAX_MANIFEST_BYTES + 1)
                      if len(data) > MAX_MANIFEST_BYTES:
                          raise ValueError(f"manifest exceeds {MAX_MANIFEST_BYTES // 1024} KB limit")
                      return data
                  except Exception as e:
                      last_exc = e
                      if not is_transient(e) or attempt == MAX_RETRIES - 1:
                          raise
                      delay = RETRY_DELAYS[min(attempt, len(RETRY_DELAYS) - 1)]
                      print(f"  Attempt {attempt + 1} failed ({e}), retrying in {delay}s...")
                      time.sleep(delay)

          with open('changed_packs.json') as f:
              packs = json.load(f)

          if not packs:
              print("No changed packs — skipping coverage check")
              with open('coverage_results.json', 'w') as f:
                  json.dump({'errors': [], 'warnings': [], 'packs': {}}, f)
              sys.exit(0)

          errors = []
          warnings = []
          pack_results = {}
          any_fail = False

          for pack in packs:
              name = pack['name']
              repo = pack.get('source_repo', '')
              ref = pack.get('source_ref', 'main')
              path = pack.get('source_path', '.')

              print(f"\n=== Coverage check: {name} ({repo}@{ref}) ===")

              if not repo:
                  errors.append(f"{name}: missing source_repo")
                  pack_results[name] = {'pass': False, 'error': 'missing source_repo'}
                  any_fail = True
                  continue

              # Build manifest URL (same pattern as sources step)
              if path and path != '.':
                  base = f"https://raw.githubusercontent.com/{repo}/{ref}/{path}"
              else:
                  base = f"https://raw.githubusercontent.com/{repo}/{ref}"

              manifest_url = f"{base}/openpeon.json"
              try:
                  manifest_bytes = fetch_manifest(manifest_url)
                  manifest = json.loads(manifest_bytes)
              except Exception as e:
                  errors.append(f"{name}: cannot fetch manifest: {e}")
                  pack_results[name] = {'pass': False, 'error': str(e)}
                  any_fail = True
                  continue

              categories = manifest.get('categories', {})

              # Count sounds per category and collect unique files
              cat_counts = {}
              all_files = set()
              for cat_name, cat_data in categories.items():
                  sounds = cat_data.get('sounds', [])
                  cat_counts[cat_name] = len(sounds)
                  for s in sounds:
                      f = s.get('file', '')
                      if f:
                          all_files.add(f)

              total_sounds = len(all_files)

              # Check core categories
              missing_core = [c for c in CORE_CATEGORIES if cat_counts.get(c, 0) == 0]
              thin_core = [c for c in CORE_CATEGORIES if cat_counts.get(c, 0) == 1]

              pack_pass = True

              # FAIL: missing core categories
              if missing_core:
                  errors.append(f"{name}: missing core categories: {', '.join(missing_core)}")
                  pack_pass = False

              # FAIL: fewer than 6 total unique sounds
              if total_sounds < MIN_TOTAL_SOUNDS:
                  errors.append(f"{name}: only {total_sounds} unique sounds (minimum {MIN_TOTAL_SOUNDS})")
                  pack_pass = False

              # WARN: thin core categories (exactly 1 sound)
              if thin_core:
                  warnings.append(f"{name}: core categories with only 1 sound: {', '.join(thin_core)}")

              # WARN: total sounds below median
              if total_sounds < WARN_TOTAL_SOUNDS:
                  warnings.append(f"{name}: only {total_sounds} total sounds (median packs have {WARN_TOTAL_SOUNDS}+)")

              if not pack_pass:
                  any_fail = True

              # Report per-category counts
              for c in CORE_CATEGORIES:
                  count = cat_counts.get(c, 0)
                  status = 'missing' if count == 0 else ('thin' if count == 1 else 'ok')
                  print(f"  {c}: {count} sounds ({status})")
              print(f"  Total unique sounds: {total_sounds}")
              print(f"  Result: {'FAIL' if not pack_pass else 'PASS'}")

              pack_results[name] = {
                  'categories': {c: cat_counts.get(c, 0) for c in CORE_CATEGORIES},
                  'total_sounds': total_sounds,
                  'missing_core': missing_core,
                  'thin_core': thin_core,
                  'pass': pack_pass,
              }

          # Save results
          with open('coverage_results.json', 'w') as f:
              json.dump({'errors': errors, 'warnings': warnings, 'packs': pack_results}, f)

          # Report
          print("\n" + "=" * 60)
          if warnings:
              print(f"\nWarnings ({len(warnings)}):")
              for w in warnings:
                  print(f"  - {w}")

          if errors:
              print(f"\nErrors ({len(errors)}):")
              for e in errors:
                  print(f"  - {e}")

          if any_fail:
              sys.exit(1)
          else:
              print(f"\nAll {len(packs)} {'pack' if len(packs) == 1 else 'packs'} passed coverage check")
          PYEOF

      - name: Install ffmpeg
        if: always() && steps.detect.outcome == 'success'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1
          ffprobe -version | head -1

      - name: Validate audio quality
        id: quality
        if: always() && steps.detect.outcome == 'success'
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, tarfile, tempfile, time, urllib.request, urllib.error

          DOWNLOAD_TIMEOUT = 60
          MAX_RETRIES = 3
          RETRY_DELAYS = [2, 5]  # seconds between retries

          def is_transient(exc):
              """Return True for errors worth retrying."""
              transient_types = (ConnectionResetError, ConnectionAbortedError, TimeoutError, OSError)
              if isinstance(exc, transient_types):
                  return True
              if isinstance(exc, urllib.error.URLError) and not isinstance(exc, urllib.error.HTTPError):
                  return True
              if isinstance(exc, urllib.error.HTTPError) and exc.code >= 500:
                  return True
              return False

          def download_with_retry(url, dest_path):
              """Download URL to dest_path with retry on transient errors."""
              for attempt in range(MAX_RETRIES):
                  try:
                      resp = urllib.request.urlopen(url, timeout=DOWNLOAD_TIMEOUT)
                      with open(dest_path, 'wb') as dl:
                          dl.write(resp.read())
                      return
                  except Exception as e:
                      if not is_transient(e) or attempt == MAX_RETRIES - 1:
                          raise
                      delay = RETRY_DELAYS[min(attempt, len(RETRY_DELAYS) - 1)]
                      print(f"  Attempt {attempt + 1} failed ({e}), retrying in {delay}s...")
                      time.sleep(delay)

          with open('changed_packs.json') as f:
              packs = json.load(f)

          if not packs:
              print("No changed packs — skipping quality check")
              with open('quality_results.json', 'w') as f:
                  json.dump([], f)
              sys.exit(0)

          all_results = []
          any_rejected = False

          for pack in packs:
              name = pack['name']
              repo = pack.get('source_repo', '')
              ref = pack.get('source_ref', 'main')
              path = pack.get('source_path', '.').strip('/')

              print(f"\n=== Quality check: {name} ({repo}@{ref}) ===")

              if not repo:
                  all_results.append({'pack_name': name, 'error': 'missing source_repo', 'verdict': 'REJECTED'})
                  any_rejected = True
                  continue

              # Download pack tarball
              tarball_url = f"https://github.com/{repo}/archive/{ref}.tar.gz"
              pack_dir = tempfile.mkdtemp(prefix=f"qc-{name}-")
              try:
                  tmp = tempfile.NamedTemporaryFile(suffix=".tar.gz", delete=False)
                  download_with_retry(tarball_url, tmp.name)

                  with tarfile.open(tmp.name, "r:gz") as tf:
                      members = tf.getmembers()
                      top = members[0].name.split("/")[0]
                      prefix_path = f"{top}/{path}/" if path and path != "." else f"{top}/"

                      for m in members:
                          if m.name.startswith(prefix_path) and m.name != prefix_path.rstrip("/"):
                              rel = m.name[len(prefix_path):]
                              if not rel:
                                  continue
                              dest = os.path.join(pack_dir, rel)
                              if m.isdir():
                                  os.makedirs(dest, exist_ok=True)
                              elif m.isfile():
                                  os.makedirs(os.path.dirname(dest), exist_ok=True)
                                  with tf.extractfile(m) as src:
                                      with open(dest, "wb") as dst:
                                          dst.write(src.read())

                  os.unlink(tmp.name)
                  # Debug: show extracted contents
                  for root, dirs, files in os.walk(pack_dir):
                      for fname in files:
                          fpath = os.path.join(root, fname)
                          rel = os.path.relpath(fpath, pack_dir)
                          print(f"  extracted: {rel}")
              except Exception as e:
                  print(f"  Download failed: {e}")
                  all_results.append({'pack_name': name, 'error': f'download failed: {e}', 'verdict': 'REJECTED'})
                  any_rejected = True
                  continue

              # Run quality check
              result = subprocess.run(
                  ['python3', '.github/scripts/quality-check.py',
                   pack_dir,
                   '--output-json', f'quality_{name}.json',
                   '--output-markdown', f'quality_{name}.md',
                   '--quiet'],
                  capture_output=True, text=True, timeout=300
              )

              if result.returncode != 0:
                  print(f"  quality-check.py exit code: {result.returncode}")
                  if result.stderr:
                      print(f"  stderr: {result.stderr[:500]}")
                  if result.stdout:
                      print(f"  stdout: {result.stdout[:500]}")

              try:
                  with open(f'quality_{name}.json') as f:
                      pack_result = json.load(f)
              except Exception:
                  pack_result = {'pack_name': name, 'error': 'quality check script failed', 'verdict': 'REJECTED'}

              all_results.append(pack_result)

              verdict = pack_result.get('verdict', 'REJECTED')
              total_blocks = pack_result.get('total_blocks', 0)
              total_warns = pack_result.get('total_warns', 0)
              total_files = pack_result.get('total_files', 0)
              print(f"  {verdict}: {total_files} files, {total_blocks} blocks, {total_warns} warns")

              if verdict == 'REJECTED':
                  any_rejected = True

          # Write combined results
          with open('quality_results.json', 'w') as f:
              json.dump(all_results, f, indent=2, default=str)

          if any_rejected:
              print("\nOne or more packs REJECTED by quality check")
              sys.exit(1)
          else:
              print("\nAll packs passed quality check")
          PYEOF

      - name: Upload quality results
        if: always() && steps.quality.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: quality-results
          path: |
            quality_results.json
            quality_*.md
          retention-days: 90

      - name: Write verdict
        if: always()
        env:
          SCHEMA_RESULT: ${{ steps.schema.outcome }}
          TRUST_RESULT: ${{ steps.trust.outcome }}
          SOURCES_RESULT: ${{ steps.sources.outcome }}
          COVERAGE_RESULT: ${{ steps.coverage.outcome }}
          QUALITY_RESULT: ${{ steps.quality.outcome }}
        run: |
          if [ "$SCHEMA_RESULT" = "success" ] && [ "$TRUST_RESULT" = "success" ] \
             && [ "$SOURCES_RESULT" = "success" ] && [ "$COVERAGE_RESULT" = "success" ] \
             && [ "$QUALITY_RESULT" = "success" ]; then
            echo "pass" > verdict.txt
          else
            echo "fail" > verdict.txt
          fi
          echo "Verdict: $(cat verdict.txt)"

      - name: Post review comment
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SCHEMA_RESULT: ${{ steps.schema.outcome }}
          TRUST_RESULT: ${{ steps.trust.outcome }}
          SOURCES_RESULT: ${{ steps.sources.outcome }}
          COVERAGE_RESULT: ${{ steps.coverage.outcome }}
          QUALITY_RESULT: ${{ steps.quality.outcome }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          pr = os.environ['PR_NUMBER']
          schema_ok = os.environ.get('SCHEMA_RESULT') == 'success'
          trust_ok = os.environ.get('TRUST_RESULT') == 'success'
          sources_ok = os.environ.get('SOURCES_RESULT') == 'success'
          coverage_ok = os.environ.get('COVERAGE_RESULT') == 'success'
          quality_ok = os.environ.get('QUALITY_RESULT') == 'success'
          all_ok = schema_ok and trust_ok and sources_ok and coverage_ok and quality_ok

          # Load detection results
          detect = {}
          try:
              with open('detect_results.json') as f:
                  detect = json.load(f)
          except:
              pass

          new_packs = detect.get('new', [])
          updated_packs = detect.get('updated', [])
          pack_details = detect.get('packs', {})

          # Load source validation results
          source_results = {'errors': [], 'warnings': [], 'checks': {}}
          try:
              with open('source_results.json') as f:
                  source_results = json.load(f)
          except:
              pass

          # Load trust errors
          trust_errors = []
          try:
              with open('trust_errors.json') as f:
                  trust_errors = json.load(f)
          except:
              pass

          # Load schema errors
          schema_errors = []
          try:
              with open('schema_errors.json') as f:
                  schema_errors = json.load(f)
          except:
              pass

          # Build comment
          icon = "white_check_mark" if all_ok else "x"
          lines = [f"## :{icon}: Pack Registry Review\n"]

          # Pack summary
          if new_packs or updated_packs:
              lines.append("### Packs\n")
              for name in new_packs:
                  p = pack_details.get(name, {})
                  display = p.get('display_name', name)
                  tier = p.get('trust_tier', '?')
                  count = p.get('sound_count', '?')
                  lang = p.get('language', '?')
                  lines.append(f"- **{display}** (`{name}`) — NEW | {tier} | {lang} | {count} sounds")
              for name in updated_packs:
                  p = pack_details.get(name, {})
                  display = p.get('display_name', name)
                  lines.append(f"- **{display}** (`{name}`) — UPDATED")
              lines.append("")

          # Checks table
          lines.append("### Checks\n")
          lines.append("| Check | Result |")
          lines.append("|---|---|")
          lines.append(f"| Schema validation | {'pass' if schema_ok else 'FAIL'} |")
          lines.append(f"| Trust tier | {'pass' if trust_ok else 'FAIL'} |")
          lines.append(f"| Manifest fetch | {'pass' if sources_ok else 'FAIL'} |")
          lines.append(f"| Category coverage | {'pass' if coverage_ok else 'FAIL'} |")

          # Per-pack source checks
          checks = source_results.get('checks', {})
          for name, c in checks.items():
              if c.get('sha256') is True:
                  lines.append(f"| SHA256 ({name}) | pass |")
              elif c.get('sha256') is False:
                  lines.append(f"| SHA256 ({name}) | FAIL |")

              audio = c.get('audio_files', [])
              if audio:
                  ok_count = sum(1 for a in audio if a.get('ok'))
                  total = len(audio)
                  status = 'pass' if ok_count == total else 'FAIL'
                  file_list = '<br>'.join(f'• {a["file"]}' for a in audio)
                  lines.append(f"| Audio spot-check ({name}) | {status} ({ok_count}/{total})<br>{file_list} |")

          lines.append(f"| Audio quality | {'pass' if quality_ok else 'FAIL'} |")
          lines.append("")

          # Quality check results
          try:
              with open('quality_results.json') as f:
                  quality_results = json.load(f)
          except:
              quality_results = []

          if quality_results:
              lines.append("### Audio Quality\n")
              for qr in quality_results:
                  verdict = qr.get('verdict', 'REJECTED')
                  qname = qr.get('display_name', qr.get('pack_name', '?'))
                  nfiles = qr.get('total_files', 0)
                  nblocks = qr.get('total_blocks', 0)
                  nwarns = qr.get('total_warns', 0)

                  if verdict == 'GOLD':
                      qicon = ':star:'
                      label = 'All quality checks passed'
                  elif verdict == 'SILVER':
                      qicon = ':white_check_mark:'
                      label = f'Accepted with {nwarns} {"warning" if nwarns == 1 else "warnings"}'
                  else:
                      qicon = ':x:'
                      label = f'{nblocks} blocking {"issue" if nblocks == 1 else "issues"} must be fixed'

                  lines.append(f"#### {qicon} {qname}: {verdict}\n")
                  lines.append(f"{nfiles} audio files analyzed — **{label}**\n")

                  # Error shortcut (missing manifest, no sounds dir, etc.)
                  if qr.get('error'):
                      lines.append(f"> **Error:** {qr['error']}\n")
                      continue

                  # REJECTED: show all blocking issues with file details
                  if verdict == 'REJECTED' and nblocks > 0:
                      lines.append("**Blocking issues** — these must be fixed before the pack can be accepted:\n")
                      lines.append("| File | Issue |")
                      lines.append("|---|---|")
                      blocked_files = [f for f in qr.get('files', []) if f.get('blocks')]
                      for bf in blocked_files:
                          for b in bf['blocks']:
                              lines.append(f"| `{bf['file']}` | {b} |")
                      lines.append("")

                  # SILVER or REJECTED with warnings: show warnings with file details
                  warned_files = [f for f in qr.get('files', []) if f.get('warns')]
                  if warned_files:
                      if verdict == 'REJECTED':
                          lines.append("**Warnings** — not blocking, but recommended to address:\n")
                      else:
                          lines.append("**Warnings** — pack is accepted, but please consider addressing these in a future release:\n")
                      # Group warnings by type for a cleaner summary
                      warn_groups = {}
                      for wf in warned_files:
                          for w in wf.get('warns', []):
                              warn_groups.setdefault(w, []).append(wf['file'])

                      if len(warned_files) <= 10:
                          # Few enough to show inline table
                          lines.append("| File | Issue |")
                          lines.append("|---|---|")
                          for wf in warned_files:
                              for w in wf.get('warns', []):
                                  lines.append(f"| `{wf['file']}` | {w} |")
                          lines.append("")
                      else:
                          # Many warnings — group by issue type
                          for issue, files in sorted(warn_groups.items(), key=lambda x: -len(x[1])):
                              file_list = ', '.join(f'`{f}`' for f in files[:8])
                              extra = f' and {len(files) - 8} more' if len(files) > 8 else ''
                              lines.append(f"- **{issue}** ({len(files)} files): {file_list}{extra}")
                          lines.append("")

                  # Threshold reference (collapsible)
                  lines.append("<details><summary>Threshold reference</summary>\n")
                  lines.append("| Check | Block | Warn |")
                  lines.append("|---|---|---|")
                  lines.append("| Volume (true peak) | — | >= -0.5 dBTP |")
                  lines.append("| Dead air at start | > 2000 ms | > 500 ms |")
                  lines.append("| Dead air at end | > 2000 ms | > 500 ms |")
                  lines.append("| Loudness (LUFS) | < -70.0 | < -35.0 or > -8.0 |")
                  lines.append("| Bitrate | — | < 64 kbps |")
                  lines.append("| Sample rate | < 8000 Hz | < 16000 Hz |")
                  lines.append("| Duration | > 20.0s or < 0.1s | > 5.0s |")
                  lines.append("\n</details>\n")

              lines.append("")

          # Category coverage results
          coverage_results = {'errors': [], 'warnings': [], 'packs': {}}
          try:
              with open('coverage_results.json') as f:
                  coverage_results = json.load(f)
          except:
              pass

          cov_packs = coverage_results.get('packs', {})
          if cov_packs:
              lines.append("### Category Coverage\n")
              for cname, cdata in cov_packs.items():
                  if cdata.get('error'):
                      lines.append(f"#### :x: {cname}: FAIL\n")
                      lines.append(f"> **Error:** {cdata['error']}\n")
                      continue

                  cpass = cdata.get('pass', False)
                  total = cdata.get('total_sounds', 0)
                  cats = cdata.get('categories', {})
                  missing = cdata.get('missing_core', [])
                  thin = cdata.get('thin_core', [])
                  populated = sum(1 for v in cats.values() if v > 0)

                  if not cpass:
                      cicon = ':x:'
                      clabel = 'FAIL'
                  elif thin:
                      cicon = ':warning:'
                      clabel = 'PASS (with warnings)'
                  else:
                      cicon = ':white_check_mark:'
                      clabel = 'PASS'

                  lines.append(f"#### {cicon} {cname}: {clabel}\n")
                  lines.append(f"{total} sounds across {populated}/6 core categories")
                  if missing:
                      lines.append(f" — **missing: {', '.join(missing)}**")
                  lines.append("\n")

                  lines.append("| Category | Sounds | Status |")
                  lines.append("|---|---|---|")
                  for cat in ['session.start', 'task.acknowledge', 'task.complete', 'task.error', 'input.required', 'resource.limit']:
                      count = cats.get(cat, 0)
                      if count == 0:
                          status = ':x: missing'
                      elif count == 1:
                          status = ':warning: thin'
                      else:
                          status = ':white_check_mark:'
                      lines.append(f"| {cat} | {count} | {status} |")
                  lines.append("")

                  if not cpass:
                      lines.append("> Packs must populate all 6 core categories with at least 1 sound each, and have >= 6 total sounds.\n")
                  elif thin:
                      lines.append("> Pack is accepted, but please consider addressing thin categories in a future release.\n")

              lines.append("")

          # Errors
          all_errors = schema_errors + trust_errors + source_results.get('errors', []) + coverage_results.get('errors', [])
          if all_errors:
              lines.append("### Errors\n")
              for e in all_errors:
                  lines.append(f"- {e}")
              lines.append("")

          # Warnings
          all_warnings = source_results.get('warnings', []) + coverage_results.get('warnings', [])
          if all_warnings:
              lines.append("### Warnings\n")
              for w in all_warnings:
                  lines.append(f"- {w}")
              lines.append("")

          # Verdict
          if all_ok:
              lines.append("All checks passed. Auto-approving and enabling auto-merge.")
          else:
              lines.append("Some checks failed. Please fix the issues above and push again.")

          comment = '\n'.join(lines)

          # Post comment
          subprocess.run(
              ['gh', 'pr', 'comment', pr, '--body', comment],
              check=True
          )
          print("Posted review comment")
          PYEOF

      - name: Auto-approve
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          VERDICT=$(cat verdict.txt 2>/dev/null || echo "fail")
          if [ "$VERDICT" = "pass" ]; then
            gh pr review "$PR_NUMBER" --approve --body "All automated checks passed."
            echo "PR approved"
          else
            echo "Skipping approval — checks did not pass"
          fi

      - name: Enable auto-merge
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          VERDICT=$(cat verdict.txt 2>/dev/null || echo "fail")
          if [ "$VERDICT" = "pass" ]; then
            gh pr merge "$PR_NUMBER" --auto --squash --delete-branch || echo "Auto-merge could not be enabled (branch protection may not be configured)"
            echo "Auto-merge enabled"
          else
            echo "Skipping auto-merge — checks did not pass"
          fi
